# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

command_timeout = 2000
scan_timeout = 10

format = '$directory$git_branch $git_metrics$fill$time$line_break$character'

palette = 'colors'

[palettes.colors]
color1 = '{{colors.primary_fixed_dim.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface_variant.default.hex}}'
color4 = '{{colors.surface_container.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.surface_dim.default.hex}}'
color7 = '{{colors.surface.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

[package]
disabled = true

[fill]
disabled = false
symbol = " "

[character]
success_symbol = "❯(color9 bold)"
error_symbol = "❯(@{error})"

[git_branch]
symbol = 'on '
format = "$symbol(bg:color8 fg:color5)$branch(fg:color3 bg:color4)"

[git_metrics]
disabled = false

[time]
format = "$time"
disabled = false
time_format = "%R:%S" # Hour:Minute Format

