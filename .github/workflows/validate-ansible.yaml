name: Validate Ansible

on:
  pull_request:
    paths:
      - ansible/**
      - .github/workflows/validate-ansible.yaml
  push:
    branches:
      - main
    paths:
      - ansible/**
      - .github/workflows/validate-ansible.yaml
  workflow_dispatch:

jobs:
  validate-ansible:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for Ansible changes
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only \
              origin/${{ github.base_ref }}...HEAD)
          elif [ "${{ github.event_name }}" = "push" ]; then
            files=$(git diff --name-only \
              ${{ github.event.before }} \
              ${{ github.sha }})
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$files"

          if echo "$files" | grep -qE '^ansible/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible + collections
        if: steps.changes.outputs.changed == 'true'
        run: |
          pip install ansible
          ansible-galaxy collection install \
            community.general kewlfft.aur

      - name: Validate playbook syntax
        if: steps.changes.outputs.changed == 'true'
        run: |
          ansible-playbook ansible/playbook.yml \
            -i ansible/inventory.yml --syntax-check

      - name: Validate inventory
        if: steps.changes.outputs.changed == 'true'
        run: |
          ansible-inventory -i ansible/inventory.yml --list > /dev/null

      - name: Validate YAML syntax
        if: steps.changes.outputs.changed == 'true'
        run: |
          pip install yamllint
          yamllint ansible/

      - name: Skip validation
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "No Ansible changes detected."
          echo "Skipping validation."
